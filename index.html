<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Minecraft Server Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgb(255, 205, 0) 0%, rgb(220, 175, 0) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: rgb(207, 166, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-image {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .server-id-info {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, rgb(207, 166, 0) 0%, rgb(177, 136, 0) 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(42, 82, 152, 0.3);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .big-button {
            width: 100% !important;
            padding: 20px 40px !important;
            font-size: 20px !important;
            margin-top: 20px;
            border-radius: 15px !important;
        }

        .big-button:hover:not(:disabled) {
            transform: scale(1.05) !important;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status.hidden {
            display: none;
        }

        .status.loading {
            display: block;
            background: #f0f7ff;
            color: #2a5298;
            border: 2px solid #2a5298;
        }

        .status.success {
            display: block;
            background: #f0fdf4;
            color: #22c55e;
            border: 2px solid #22c55e;
        }

        .status.error {
            display: block;
            background: #fef2f2;
            color: #dc2626;
            border: 2px solid #dc2626;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(42, 82, 152, 0.2);
            border-top-color: #2a5298;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: #f9f9f9;
            border-left: 4px solid #2a5298;
            padding: 12px 15px;
            border-radius: 5px;
            font-size: 13px;
            color: #666;
            margin-top: 20px;
            line-height: 1.5;
        }

        .setup-box {
            background: #f0f7ff;
            border-left: 4px solid #207bff;
            padding: 15px;
            border-radius: 5px;
            font-size: 13px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>

    <style>
        .btn-primary{
            background: linear-gradient(135deg,rgb(207,166,0) 0%,rgb(177,136,0) 100%) !important;
            color:white;
            box-shadow:
                0 10px 25px rgba(207,166,0,.35),
                0 0 20px rgba(207,166,0,.15);
            transition:transform .25s ease,box-shadow .25s ease,filter .25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            border-radius: 10px;
            opacity: 0;
            animation: starBorder 3s ease-in-out infinite;
            pointer-events: none;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: conic-gradient(from 0deg, 
                rgba(255,255,255,0) 0deg,
                rgba(255,255,255,0.8) 90deg,
                rgba(255,255,255,0) 180deg);
            border-radius: 10px;
            opacity: 0;
            animation: starBorderRotate 3s linear infinite;
            pointer-events: none;
        }

        @keyframes starBorder {
            0%, 100% {
                opacity: 0;
                box-shadow: 
                    0 0 10px rgba(207,166,0,0),
                    0 0 20px rgba(207,166,0,0);
            }
            50% {
                opacity: 1;
                box-shadow: 
                    0 0 15px rgba(207,166,0,0.6),
                    0 0 30px rgba(207,166,0,0.3);
            }
        }

        @keyframes starBorderRotate {
            0% {
                transform: rotate(0deg);
                opacity: 0;
            }
            25% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
            75% {
                opacity: 0.6;
            }
            100% {
                transform: rotate(360deg);
                opacity: 0;
            }
        }

        .btn-primary:hover:not(:disabled){
            transform:translateY(-2px);
            filter:brightness(1.12);
            box-shadow:
                0 15px 35px rgba(207,166,0,.45),
                0 0 40px rgba(207,166,0,.30),
                0 0 60px rgba(207,166,0,.2);
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                🎮 Therians Server
                <img src="nobodyhead.png" alt="Minecraft Head" class="header-image">
            </h1>
            <p>Powered by ΝϴᏴϴᎠᎽ_</p>
        </div>

        <div id="setupBox" class="setup-box">
            <strong>⚙️ Autenticazione richiesta</strong><br>
            Clicca il bottone per autenticarti con Minefort, poi ritorna qui!
        </div>

        <button class="btn btn-primary big-button" id="startBtn" onclick="startServer()" style="display: none;">
            ⚡ ACCENDI SERVER
        </button>

        <button class="btn btn-primary big-button" id="setupBtn" onclick="setupAuth()" style="display: none;">
            ⚙️ AUTENTICA SU MINEFORT
        </button>

        <div class="status hidden" id="status"></div>
    </div>

    <script>
        let isAuthenticated = false;

        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;

            if (type === 'loading') {
                statusEl.innerHTML = `<span class="spinner"></span>${message}`;
            }
        }

        function hideStatus() {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status hidden';
        }

        function updateAuthUI() {
            const startBtn = document.getElementById('startBtn');
            const setupBtn = document.getElementById('setupBtn');
            const setupBox = document.getElementById('setupBox');

            if (isAuthenticated) {
                startBtn.style.display = 'block';
                setupBtn.style.display = 'none';
                setupBox.style.display = 'none';
                startBtn.disabled = false;
            } else {
                startBtn.style.display = 'none';
                setupBtn.style.display = 'block';
                setupBox.style.display = 'block';
                hideStatus();
            }
        }

        async function setupAuth() {
            const loginWindow = window.open('https://minefort.com/login', 'MinefortLogin', 'width=800,height=600');
            
            const checkInterval = setInterval(async () => {
                if (loginWindow.closed) {
                    clearInterval(checkInterval);
                    
                    showStatus('🔍 Verifica autenticazione...', 'loading');
                    
                    try {
                        const response = await fetch('/api/verify-auth', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({})
                        });

                        const data = await response.json();

                        if (data.authenticated) {
                            isAuthenticated = true;
                            showStatus('✅ Autenticazione riuscita!', 'success');
                            setTimeout(() => {
                                hideStatus();
                                updateAuthUI();
                            }, 2000);
                        } else {
                            showStatus('❌ Autenticazione non riuscita. Riprova!', 'error');
                        }
                    } catch (error) {
                        showStatus(`❌ Errore: ${error.message}`, 'error');
                    }
                }
            }, 2000);
        }

        async function startServer() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;

            showStatus('🔄 Accensione del server...', 'loading');

            try {
                const response = await fetch('/api/start-server', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({}),
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('✅ Server acceso! 🚀 Dovrebbe essere online tra 30-60 secondi.', 'success');
                } else {
                    showStatus(`❌ ${data.error || 'Errore sconosciuto'}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Errore di connessione: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        async function checkAuth() {
            try {
                const response = await fetch('/api/check-auth');
                const data = await response.json();
                isAuthenticated = data.authenticated;
                updateAuthUI();
            } catch (error) {
                updateAuthUI();
            }
        }

        checkAuth();
    </script>

    <script>
        if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
            const cursor = document.createElement("img");
            cursor.src = "Minecraft Enchanted Diamond Axe--pointer--SweezyCursors.png";
            cursor.className = "custom-cursor";

            cursor.style.position = "fixed";
            cursor.style.width = "24px";
            cursor.style.height = "24px";
            cursor.style.pointerEvents = "none";
            cursor.style.zIndex = "999999";
            cursor.style.imageRendering = "pixelated";

            document.body.appendChild(cursor);
            document.documentElement.style.cursor = "none";

            document.addEventListener("mousemove", (e) => {
                cursor.style.left = e.clientX + "px";
                cursor.style.top = e.clientY + "px";
            });
        } else {
            document.documentElement.style.cursor = "auto";
        }
    </script>
</body>
</html>
