<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Minecraft Server Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgb(255, 205, 0) 0%, rgb(220, 175, 0) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: rgb(207, 166, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-image {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 20px 40px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            background: linear-gradient(135deg, rgb(207, 166, 0) 0%, rgb(177, 136, 0) 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(207, 166, 0, 0.35), 0 0 20px rgba(207, 166, 0, 0.15);
            transition: all 0.3s;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.12);
            box-shadow: 0 15px 35px rgba(207, 166, 0, 0.45), 0 0 40px rgba(207, 166, 0, 0.30);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status.hidden {
            display: none;
        }

        .status.loading {
            display: block;
            background: #f0f7ff;
            color: #2a5298;
            border: 2px solid #2a5298;
        }

        .status.success {
            display: block;
            background: #f0fdf4;
            color: #22c55e;
            border: 2px solid #22c55e;
        }

        .status.error {
            display: block;
            background: #fef2f2;
            color: #dc2626;
            border: 2px solid #dc2626;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(42, 82, 152, 0.2);
            border-top-color: #2a5298;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                🎮 Therians Server
                <img src="nobodyhead.png" alt="Minecraft Head" class="header-image">
            </h1>
            <p>Powered by ΝϴᏴϴᎠᎽ_</p>
        </div>

        <button class="btn" id="serverBtn" onclick="handleServerBtn()">
            ⚡ ACCENDI SERVER
        </button>

        <div class="status hidden" id="status"></div>
    </div>

    <script>
        let phase = 'wake'; // 'wake' o 'start'
        let isWaiting = false;

        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;

            if (type === 'loading') {
                statusEl.innerHTML = `<span class="spinner"></span>${message}`;
            }
        }

        function hideStatus() {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status hidden';
        }

        function updateButtonText() {
            const btn = document.getElementById('serverBtn');
            if (phase === 'wake') {
                btn.textContent = '⚡ WAKE UP SERVER';
            } else {
                btn.textContent = '▶️ START SERVER';
            }
        }

        async function handleServerBtn() {
            const btn = document.getElementById('serverBtn');
            
            if (phase === 'wake') {
                // Fase WAKE
                btn.disabled = true;
                isWaiting = true;
                showStatus('🔄 Wake up...', 'loading');

                try {
                    const response = await fetch('/api/wake-server', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({})
                    });

                    const data = await response.json();

                    if (data.success) {
                        showStatus('⏳ Aspetta 10 secondi...', 'loading');
                        
                        // Aspetta 10 secondi
                        for (let i = 10; i > 0; i--) {
                            await new Promise(resolve => setTimeout(resolve, 1000));
                            if (i > 1) {
                                const status = document.getElementById('status');
                                status.innerHTML = `<span class="spinner"></span>⏳ Aspetta ${i} secondi...`;
                            }
                        }

                        // Cambia fase
                        phase = 'start';
                        updateButtonText();
                        showStatus('✅ Clicca per avviare il server!', 'success');
                        btn.disabled = false;
                        isWaiting = false;
                    } else {
                        showStatus(`❌ ${data.error}`, 'error');
                        btn.disabled = false;
                        isWaiting = false;
                    }
                } catch (error) {
                    showStatus(`❌ Errore: ${error.message}`, 'error');
                    btn.disabled = false;
                    isWaiting = false;
                }
            } else if (phase === 'start') {
                // Fase START
                btn.disabled = true;
                showStatus('🔄 Avvio server...', 'loading');

                try {
                    const response = await fetch('/api/start-server', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({})
                    });

                    const data = await response.json();

                    if (data.success) {
                        showStatus('✅ Server acceso! 🚀 Online tra 30-60 secondi.', 'success');
                        // Reset per prossimo ciclo
                        setTimeout(() => {
                            phase = 'wake';
                            updateButtonText();
                            hideStatus();
                            btn.disabled = false;
                        }, 5000);
                    } else {
                        showStatus(`❌ ${data.error}`, 'error');
                        btn.disabled = false;
                    }
                } catch (error) {
                    showStatus(`❌ Errore: ${error.message}`, 'error');
                    btn.disabled = false;
                }
            }
        }

        updateButtonText();
    </script>
</body>
</html>
