<!DOCTYPE html>
<html lang="it">
<style>
* {
  cursor: none !important;
}

.custom-cursor{
  position: fixed;
  width: 24px;
  height: 24px;
  pointer-events: none;
  z-index: 999999;
  image-rendering: pixelated;
}
</style>

<img src="Minecraft Enchanted Diamond Axe--pointer--SweezyCursors.png" class="custom-cursor" id="cursor">

<script>
const cursor = document.getElementById('cursor');

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Minecraft Server Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgb(255, 205, 0) 0%, rgb(220, 175, 0) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: rgb(207, 166, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-image {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .server-id-info {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, rgb(207, 166, 0) 0%, rgb(177, 136, 0) 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(42, 82, 152, 0.3);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .big-button {
            width: 100% !important;
            padding: 20px 40px !important;
            font-size: 20px !important;
            margin-top: 20px;
            border-radius: 15px !important;
        }

        .big-button:hover:not(:disabled) {
            transform: scale(1.05) !important;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status.hidden {
            display: none;
        }

        .status.loading {
            display: block;
            background: #f0f7ff;
            color: #2a5298;
            border: 2px solid #2a5298;
        }

        .status.success {
            display: block;
            background: #f0fdf4;
            color: #22c55e;
            border: 2px solid #22c55e;
        }

        .status.error {
            display: block;
            background: #fef2f2;
            color: #dc2626;
            border: 2px solid #dc2626;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(42, 82, 152, 0.2);
            border-top-color: #2a5298;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: #f9f9f9;
            border-left: 4px solid #2a5298;
            padding: 12px 15px;
            border-radius: 5px;
            font-size: 13px;
            color: #666;
            margin-top: 20px;
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>

<style>
.btn-primary{
    background: linear-gradient(135deg,rgb(207,166,0) 0%,rgb(177,136,0) 100%) !important;
    color:white;
    box-shadow:
        0 10px 25px rgba(207,166,0,.35),
        0 0 20px rgba(207,166,0,.15);
    transition:transform .25s ease,box-shadow .25s ease,filter .25s ease;
}
.btn-primary:hover:not(:disabled){
    transform:translateY(-2px);
    filter:brightness(1.12);
    box-shadow:
        0 15px 35px rgba(207,166,0,.45),
        0 0 40px rgba(207,166,0,.30);
}
</style>

</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                🎮 Therians Server
                <img src="nobodyhead.png" alt="Minecraft Head" class="header-image">
            </h1>
            <p>Powered by ΝϴᏴϴᎠᎽ_</p>
        </div>

        <button class="btn btn-primary big-button" id="startBtn" onclick="startServer()">
            ⚡ ACCENDI SERVER
        </button>

        <div class="status hidden" id="status"></div>
    </div>

    <script>
        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;

            if (type === 'loading') {
                statusEl.innerHTML = `<span class="spinner"></span>${message}`;
            }
        }

        function hideStatus() {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status hidden';
        }

        async function startServer() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;

            showStatus('🔄 Accensione del server...', 'loading');

            try {
                const response = await fetch('/api/start-server', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({}), // No credentials needed - backend has them
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('✅ Server acceso! 🚀 Dovrebbe essere online tra 30-60 secondi.', 'success');
                } else {
                    showStatus(`❌ Errore: ${data.error || 'Qualcosa è andato storto'}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Errore di connessione: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function clearForm() {
            hideStatus();
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startServer();
            }
        });
    </script>
</body>
</html>
